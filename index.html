<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&display=swap" rel="stylesheet">
  
  <title>L.Allen Web Designs | Frontend Mentor | Product preview card component</title>
</head>
<body>

<div class="product-cards-wrapper">

  <div class="product-card">
    
    <div class="image-container">
      <img src="./images/image-product-desktop.jpg" alt="Gabrielle Essense Perfume Bottle">
    </div>

    <div class="product-info">

      <span class="product-category">Perfume</span>

      <h2>Gabrielle Essence Eau De Parfum</h2>

      <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>

      <div class="price-element">

        <span class="sale-price">$149.99</span>
        <p>$169.99</p>
      
      </div>

      <button class="add-to-cart">
      <img src="./images/icon-cart.svg" alt="">
      Add to Cart
      </button>

    </div>
  
  </div>

</div>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/lallendevs">L. Allen Web Designs</a>.
  </footer>
</body>
</html>
